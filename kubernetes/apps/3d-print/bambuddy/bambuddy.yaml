---
# yaml-language-server: $schema=https://raw.githubusercontent.com/external-secrets/external-secrets/refs/heads/main/config/crds/bases/external-secrets.io_externalsecrets.yaml
# DB credentials for CNPG bootstrap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-bambuddy-db-creds
  namespace: 3d-print
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: bambuddy-db-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
  data:
    - secretKey: username
      remoteRef:
        key: /BAMBUDDY/CNPG_USERNAME
    - secretKey: password
      remoteRef:
        key: /BAMBUDDY/CNPG_PASSWORD
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/external-secrets/external-secrets/refs/heads/main/config/crds/bases/external-secrets.io_externalsecrets.yaml
# Runtime config for Bambuddy (DATABASE_URL).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-bambuddy-config
  namespace: 3d-print
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: bambuddy-config
    creationPolicy: Owner
    template:
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
      data:
        DATABASE_URL: "postgresql+asyncpg://{{ .DB_USERNAME }}:{{ .DB_PASSWORD }}@bambuddy-db-rw.3d-print.svc:5432/bambuddy"
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: /BAMBUDDY/CNPG_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /BAMBUDDY/CNPG_PASSWORD
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/main/config/crd/bases/postgresql.cnpg.io_clusters.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bambuddy-db
  namespace: 3d-print
spec:
  instances: 2
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: bambuddy
      owner: bambuddy
      secret:
        name: bambuddy-db-creds
  monitoring:
    enablePodMonitor: true
---
# PersistentVolume for Bambuddy archive on NAS.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bambuddy-nfs-rwx
  labels:
    bambuddy-nfs: rwx
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.2
    - hard
    - noatime
    - timeo=600
    - retrans=2
  nfs:
    server: ${FILESERVER_NFS_HOST}
    path: /mnt/data/3d-print/bambuddy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bambuddy-data
  namespace: 3d-print
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 2Ti
  storageClassName: ""
  selector:
    matchLabels:
      bambuddy-nfs: rwx
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bambuddy-backup-nfs-rwx
  labels:
    bambuddy-backup-nfs: rwx
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.2
    - hard
    - noatime
    - timeo=600
    - retrans=2
  nfs:
    server: ${FILESERVER_NFS_HOST}
    path: /mnt/data/backup/Bambuddy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bambuddy-backup
  namespace: 3d-print
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 2Ti
  storageClassName: ""
  selector:
    matchLabels:
      bambuddy-backup-nfs: rwx
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
  namespace: 3d-print
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      bambuddy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.3.2-amd64@sha256:61387b5fcf444fe7ef922d0967249373f2640ec8c8ff6fc07cab04636e0e960b
              pullPolicy: IfNotPresent
            env:
              TZ: ${TZ}
              PORT: "8000"
            envFrom:
              - secretRef:
                  name: bambuddy-config
            ports:
              - name: http
                containerPort: 8000
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: k8s02
      securityContext:
        runAsNonRoot: true
        runAsUser: 3000
        runAsGroup: 3004
        fsGroup: 3004
        fsGroupChangePolicy: OnRootMismatch

    service:
      bambuddy:
        controller: bambuddy
        annotations:
          lineage.cozystack.io/ignore: "true"
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: "bambuddy.${DOMAIN}"
          external-dns.alpha.kubernetes.io/target: "cluster-ingress.${DOMAIN}"
        ports:
          http:
            port: 8000
            targetPort: http

    ingress:
      bambuddy:
        enabled: true
        className: tenant-root
        annotations:
          lineage.cozystack.io/ignore: "true"
          external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/hostname: "bambuddy.${DOMAIN}"
        hosts:
          - host: bambuddy.${DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: bambuddy
                  port: http
        tls:
          - hosts:
              - bambuddy.${DOMAIN}
            secretName: wildcard-le-tls-cert

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: bambuddy-data
        globalMounts:
          - path: /archive
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      backup:
        type: persistentVolumeClaim
        existingClaim: bambuddy-backup
        globalMounts:
          - path: /backup
---
apiVersion: v1
kind: Service
metadata:
  name: bambuddy-virtual-printer
  namespace: 3d-print
  annotations:
    lineage.cozystack.io/ignore: "true"
    metallb.io/address-pool: cozystack
