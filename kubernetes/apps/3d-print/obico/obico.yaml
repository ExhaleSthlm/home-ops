apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obico-data
  namespace: 3d-print
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 20Gi
  storageClassName: local
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obico
  namespace: 3d-print
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      obico:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          web:
            image:
              repository: ghcr.io/gabe565/obico/web
              tag: latest@sha256:cf4d4e2dff9370a9b6eebcc9e8f7d7d19d72efc6e563d60129f0119a2b569f97
              pullPolicy: IfNotPresent
            env:
              TZ: ${TZ}
              DEBUG: "False"
              DATABASE_URL: "sqlite:////data/db.sqlite3"
              REDIS_URL: "redis://127.0.0.1:6379"
              INTERNAL_MEDIA_HOST: "http://127.0.0.1:3334"
              ML_API_HOST: "http://127.0.0.1:3333"
              SITE_USES_HTTPS: "True"
              SITE_IS_PUBLIC: "False"
              ACCOUNT_ALLOW_SIGN_UP: "False"
              WEBPACK_LOADER_ENABLED: "False"
              OCTOPRINT_TUNNEL_PORT_RANGE: "0-0"
              CSRF_TRUSTED_ORIGINS: "[\"https://obico.${DOMAIN}\"]"
            command:
              - sh
              - -c
              - |
                python manage.py migrate && \
                python manage.py collectstatic -v 2 --noinput && \
                python manage.py shell -c "from django.contrib.sites.models import Site; s,_=Site.objects.get_or_create(domain='obico.${DOMAIN}', defaults={'name':'Obico'}); s.name='Obico'; s.save()" && \
                daphne -b 0.0.0.0 -p 3334 config.routing:application
            ports:
              - name: http
                containerPort: 3334
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hc/
                    port: 3334
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hc/
                    port: 3334
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          ml-api:
            image:
              repository: ghcr.io/gabe565/obico/ml-api
              tag: latest@sha256:aae9a45de8791ddcb5f585714c4189eb2b98886465f632698f9a386d87087501
              pullPolicy: IfNotPresent
            env:
              DEBUG: "True"
              FLASK_APP: "server.py"
              CUDA_VISIBLE_DEVICES: ""
            command:
              - gunicorn
              - --bind=0.0.0.0:3333
              - --workers=1
              - --access-logfile=-
              - wsgi
            ports:
              - name: ml-api
                containerPort: 3333
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hc/
                    port: 3333
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hc/
                    port: 3333
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 3Gi
          redis:
            image:
              repository: redis
              tag: 8.6-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
              pullPolicy: IfNotPresent
            ports:
              - name: redis
                containerPort: 6379
                protocol: TCP
            probes:
              liveness:
                enabled: true
                type: TCP
                port: redis
              readiness:
                enabled: true
                type: TCP
                port: redis
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s03
      securityContext:
        runAsNonRoot: true
        runAsUser: 3000
        runAsGroup: 3004
        fsGroup: 3004
        fsGroupChangePolicy: OnRootMismatch

    service:
      obico:
        controller: obico
        annotations:
          lineage.cozystack.io/ignore: "true"
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: "obico.${DOMAIN}"
          external-dns.alpha.kubernetes.io/target: "cluster-ingress.${DOMAIN}"
        ports:
          http:
            port: 3334
            targetPort: http

    ingress:
      obico-api:
        enabled: true
        className: tenant-root
        annotations:
          lineage.cozystack.io/ignore: "true"
        hosts:
          - host: obico.${DOMAIN}
            paths:
              - path: /api
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
              - path: /ws
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
              - path: /sockjs
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
              - path: /websocket
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
              - path: /o
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
        tls:
          - hosts:
              - obico.${DOMAIN}
            secretName: wildcard-le-tls-cert
      obico-ui:
        enabled: true
        className: tenant-root
        annotations:
          lineage.cozystack.io/ignore: "true"
          external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/hostname: "obico.${DOMAIN}"
          # --- Authentik forward-auth (NGINX Ingress) ---
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${DOMAIN}/outpost.goauthentik.io/auth/nginx"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN}/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
          nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-groups,X-authentik-jwt,X-authentik-meta"
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header Host $host;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Original-Method $request_method;
        hosts:
          - host: obico.${DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: obico
                  port: http
        tls:
          - hosts:
              - obico.${DOMAIN}
            secretName: wildcard-le-tls-cert

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: obico-data
        globalMounts:
          - path: /data
      static:
        type: emptyDir
        globalMounts:
          - path: /app/static_build
      logs:
        type: emptyDir
        globalMounts:
          - path: /tmp
