---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ai-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
  storageClassName: local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: ai-automation
data:
  # Set to an Ollama model name to pre-pull on startup.
  # This defaults to a small Qwen3 model that fits the intended CPU-only use case.
  preload-model: "qwen3:1.7b"
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ai-automation
  annotations:
    lineage.cozystack.io/ignore: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.13.4
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                OLLAMA_HOST=0.0.0.0:11434 ollama serve &
                pid="$!"
                export OLLAMA_HOST=127.0.0.1:11434

                until ollama list >/dev/null 2>&1; do
                  sleep 2
                done

                if [ -n "$OLLAMA_PRELOAD_MODEL" ]; then
                  echo "Preloading model: $OLLAMA_PRELOAD_MODEL"
                  ollama pull "$OLLAMA_PRELOAD_MODEL"
                fi

                wait "$pid"
            env:
              - name: OLLAMA_MODELS
                value: /root/.ollama/models
              - name: OLLAMA_KEEP_ALIVE
                value: 10m
              - name: OLLAMA_PRELOAD_MODEL
                valueFrom:
                  configMapKeyRef:
                    name: ollama-config
                    key: preload-model
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: "4"
                memory: 8Gi

    service:
      ollama:
        controller: ollama
        ports:
          http:
            port: 11434
            targetPort: http

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: ollama-data
        globalMounts:
          - path: /root/.ollama
