---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-fast-data
  namespace: ai-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  storageClassName: local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-fast-config
  namespace: ai-automation
data:
  preload-model: "qwen3:1.7b"
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-fast
  namespace: ai-automation
  annotations:
    lineage.cozystack.io/ignore: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama-fast:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.20.2@sha256:0455f166da85b1d07f694c33ba09278ca649603c0611ba8e46272b16eed7fccd
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                OLLAMA_HOST=0.0.0.0:11434 ollama serve &
                pid="$!"
                export OLLAMA_HOST=127.0.0.1:11434

                until ollama list >/dev/null 2>&1; do
                  sleep 2
                done

                if [ -n "$OLLAMA_PRELOAD_MODEL" ]; then
                  echo "Preloading model: $OLLAMA_PRELOAD_MODEL"
                  ollama pull "$OLLAMA_PRELOAD_MODEL"
                  echo "Warming model: $OLLAMA_PRELOAD_MODEL"
                  ollama run "$OLLAMA_PRELOAD_MODEL" "Say ready." >/dev/null
                fi

                wait "$pid"
            env:
              - name: OLLAMA_MODELS
                value: /root/.ollama/models
              - name: OLLAMA_KEEP_ALIVE
                value: 24h
              - name: OLLAMA_PRELOAD_MODEL
                valueFrom:
                  configMapKeyRef:
                    name: ollama-fast-config
                    key: preload-model
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
              limits:
                cpu: "3"
                memory: 8Gi

    service:
      ollama-fast:
        controller: ollama-fast
        ports:
          http:
            port: 11434
            targetPort: http

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: ollama-fast-data
        globalMounts:
          - path: /root/.ollama
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-default-data
  namespace: ai-automation
spec:
