---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-data
  namespace: ai-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-hermes-agent-env
  namespace: ai-automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: hermes-agent-env
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
  data:
    - secretKey: HOME_ASSISTANT_TOKEN
      remoteRef:
        key: /HERMES/HOME_ASSISTANT_TOKEN
    - secretKey: HOME_ASSISTANT_URL
      remoteRef:
        key: /HERMES/HOME_ASSISTANT_URL
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
  namespace: ai-automation
  annotations:
    lineage.cozystack.io/ignore: "true"
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes-agent:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest@sha256:b30b6e7604badf501c2e9928b3eb023b78bce7fd90e550ccc5231241b31c04a6
              pullPolicy: IfNotPresent
            args:
              - gateway
              - run
            env:
              - name: TZ
                value: ${TZ}
              - name: HERMES_DASHBOARD
                value: "1"
              - name: HERMES_DASHBOARD_INSECURE
                value: "1"
              - name: HERMES_DASHBOARD_HOST
                value: 0.0.0.0
              - name: HERMES_DASHBOARD_PORT
                value: "9119"
            envFrom:
              - secretRef:
                  name: hermes-agent-env
            ports:
              - name: dashboard
                containerPort: 9119
            resources:
              requests:
                cpu: "2"
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: hermes-agent-data
        globalMounts:
          - path: /opt/data

    service:
      hermes-agent:
        controller: hermes-agent
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/technitium: "true"
          external-dns.alpha.kubernetes.io/hostname: "hermes.${DOMAIN}"
          external-dns.alpha.kubernetes.io/target: "cluster-ingress.${DOMAIN}"
        ports:
          http:
            port: 9119
            targetPort: dashboard

    ingress:
      hermes-agent:
        enabled: true
        className: tenant-root
        annotations:
          lineage.cozystack.io/ignore: "true"
          external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/hostname: "hermes.${DOMAIN}"
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${DOMAIN}/outpost.goauthentik.io/auth/nginx"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN}/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
          nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-groups,X-authentik-jwt,X-authentik-meta"
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header Host $host;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Original-Method $request_method;
        hosts:
          - host: hermes.${DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: hermes-agent
                  port: 9119
        tls:
          - secretName: wildcard-le-tls-cert
            hosts:
              - hermes.${DOMAIN}
