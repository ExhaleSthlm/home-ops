---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wyoming-piper-data
  namespace: home-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wyoming-piper
  namespace: home-automation
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  values:
    controllers:
      wyoming-piper:
        strategy: Recreate
        initContainers:
          download-alma:
            image:
              repository: curlimages/curl
              tag: 8.18.0
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
            command:
              - sh
              - -ec
              - |
                mkdir -p /data/voices
                cd /data/voices
                if [ ! -s sv_SE-alma-medium.onnx ]; then
                  curl -fsSL -o sv_SE-alma-medium.onnx \
                    https://huggingface.co/yeagersthlm/piper-voice-sv-alma/resolve/main/sv_SE-alma-medium.onnx
                fi
                if [ ! -s sv_SE-alma-medium.onnx.json ]; then
                  curl -fsSL -o sv_SE-alma-medium.onnx.json \
                    https://huggingface.co/yeagersthlm/piper-voice-sv-alma/resolve/main/sv_SE-alma-medium.onnx.json
                fi
        containers:
          app:
            image:
              repository: rhasspy/wyoming-piper
              tag: 2.2.2
            args:
              - --voice
              - /data/voices/sv_SE-alma-medium.onnx
              - --uri
              - tcp://0.0.0.0:10200
              - --data-dir
              - /data
              - --download-dir
              - /data
            env:
              TZ: ${TZ}
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 10200
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 60
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 10200
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 10200
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 2
                  failureThreshold: 12
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
    service:
      app:
        controller: wyoming-piper
        type: LoadBalancer
        annotations:
          metallb.io/address-pool: cozystack
        loadBalancerIP: 192.168.222.123
        externalTrafficPolicy: Local
        ports:
          wyoming:
            port: 10200
            protocol: TCP
            targetPort: 10200
    persistence:
      data:
        enabled: true
        existingClaim: wyoming-piper-data
        globalMounts:
          - path: /data
