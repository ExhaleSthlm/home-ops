---
apiVersion: v1
kind: Namespace
metadata:
  name: technitium-dns
  labels:
    app.kubernetes.io/name: technitium-dns
    app.kubernetes.io/instance: technitium-dns
    ingress.svc.egress: allow
---
# WireGuard credentials for Gluetun sidecar (same pattern as Blocky).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-technitium-gluetun-wg
  namespace: technitium-dns
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: technitium-gluetun-wg
    creationPolicy: Owner
    template:
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
  data:
    - secretKey: WIREGUARD_PRIVATE_KEY
      remoteRef:
        key: /GLUETUN/WIREGUARD_PRIVATE_KEY
    - secretKey: SERVER_COUNTRIES
      remoteRef:
        key: /GLUETUN/SERVER_COUNTRIES
    - secretKey: VPN_SERVICE_PROVIDER
      remoteRef:
        key: /GLUETUN/VPN_SERVICE_PROVIDER
    - secretKey: FIREWALL_OUTBOUND_SUBNETS
      remoteRef:
        key: /GLUETUN/FIREWALL_OUTBOUND_SUBNETS
---
# Optional bootstrap values for Technitium admin + DNS domain.
# Create these keys in Infisical before first reconcile:
# - /TECHNITIUM/ADMIN_PASSWORD
# - /TECHNITIUM/DNS_SERVER_DOMAIN
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-technitium-bootstrap
  namespace: technitium-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: technitium-bootstrap
    creationPolicy: Owner
    template:
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
  data:
    - secretKey: DNS_SERVER_ADMIN_PASSWORD
      remoteRef:
        key: /TECHNITIUM/ADMIN_PASSWORD
    - secretKey: DNS_SERVER_DOMAIN
      remoteRef:
        key: /TECHNITIUM/DNS_SERVER_DOMAIN
---
# Technitium DNS (authoritative + recursive + blocklists) in parallel with PowerDNS/Blocky.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: technitium-dns
  namespace: technitium-dns
spec:
  interval: 10m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: cozy-fluxcd
  values:
    controllers:
      technitium:
        replicas: 3
        annotations:
          secret.reloader.stakater.com/reload: "technitium-bootstrap,technitium-gluetun-wg"

        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          labels:
            app.kubernetes.io/component: technitium-dns
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/component
                        operator: In
                        values:
                          - technitium-dns
                  topologyKey: kubernetes.io/hostname

        containers:
          vpn:
            image:
              repository: qmcgaw/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
              pullPolicy: IfNotPresent
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_ADMIN
            envFrom:
              - secretRef:
                  name: technitium-gluetun-wg
            env:
              VPN_TYPE: "wireguard"
              DNS_ADDRESS: "10.96.0.10"
              FIREWALL_INPUT_PORTS: "53,853,5380"
              FIREWALL_OUTBOUND_SUBNETS: "10.96.0.0/12,10.96.188.241/32,10.244.0.0/16,192.168.222.0/24"
              HEALTH_SUCCESS_WAIT_DURATION: 120s
              DNS_SERVER: "off"
              TZ: ${TZ}
              VERSION_INFORMATION: "off"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

          app:
            image:
              repository: docker.io/technitium/dns-server
              tag: 13.6.0@sha256:dde062aadaac26ada4de785abe73e9c619a3691ced05f2ebc4a827f0322c43fe
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: ${TZ}
            envFrom:
              - secretRef:
                  name: technitium-bootstrap
            ports:
              - name: dns
                containerPort: 53
                protocol: UDP
              - name: dns-tcp
                containerPort: 53
                protocol: TCP
              - name: dot
                containerPort: 853
                protocol: TCP
              - name: web
                containerPort: 5380
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: web
                  initialDelaySeconds: 20
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: web
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: web
                  failureThreshold: 30
                  periodSeconds: 5

    service:
      dns:
        controller: technitium
        type: LoadBalancer
        annotations:
          metallb.io/address-pool: cozystack
        loadBalancerIP: 192.168.222.103
        externalTrafficPolicy: Local
        ports:
          dns:
            port: 53
            protocol: UDP
            targetPort: dns
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: dns-tcp
          dot:
            port: 853
            protocol: TCP
            targetPort: dot

      web:
        controller: technitium
        annotations:
          external-dns.alpha.kubernetes.io/internal: "true"
          external-dns.alpha.kubernetes.io/hostname: "technitium.${DOMAIN}"
          external-dns.alpha.kubernetes.io/target: "cluster-ingress.${DOMAIN}"
        ports:
          web:
            port: 5380
            protocol: TCP
            targetPort: web

    ingress:
      web:
        enabled: true
        className: tenant-root
        annotations:
          external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/hostname: "technitium.${DOMAIN}"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${DOMAIN}/outpost.goauthentik.io/auth/nginx"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${DOMAIN}/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
          nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-groups,X-authentik-jwt,X-authentik-meta"
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header Host $host;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Original-Method $request_method;
        hosts:
          - host: technitium.${DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: web
                  port: web
        tls:
          - hosts:
              - technitium.${DOMAIN}
            secretName: wildcard-le-tls-cert

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /etc/dns
      tls-cert:
        type: secret
        name: wildcard-le-tls-cert
        globalMounts:
          - path: /tls
---
# Allow DNS ingress to Technitium pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-ingress
  namespace: technitium-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: technitium-dns
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 853
---
# Allow ingress-nginx namespace to access Technitium web UI service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-tenant-root
  namespace: technitium-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: technitium-dns
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tenant-root
      ports:
        - protocol: TCP
          port: 5380
