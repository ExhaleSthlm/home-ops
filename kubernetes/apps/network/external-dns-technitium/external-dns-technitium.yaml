---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns-technitium
  labels:
    app.kubernetes.io/name: external-dns-technitium
    app.kubernetes.io/instance: external-dns-technitium
---
# TSIG secret for RFC2136 dynamic updates to Technitium DNS.
# Required Infisical key:
# - /TECHNITIUM/RFC2136_TSIG_SECRET
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-technitium-rfc2136-tsig
  namespace: external-dns-technitium
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: technitium-rfc2136-tsig
    creationPolicy: Owner
    template:
      metadata:
        labels:
          reloader.stakater.com/auto: "true"
      data:
        # external-dns RFC2136 expects a base64-encoded TSIG secret.
        tsig-secret: "{{ .tsig_secret_raw | b64enc }}"
  data:
    - secretKey: tsig_secret_raw
      remoteRef:
        key: /TECHNITIUM/RFC2136_TSIG_SECRET
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-technitium
  namespace: external-dns-technitium
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: cozy-fluxcd
      interval: 1m
  values:
    provider: rfc2136
    policy: sync
    txtOwnerId: "k8s-technitium-dns"
    txtPrefix: technitium-
    sources:
      - service
    domainFilters:
      - myk8s.se
    annotationFilter: external-dns.alpha.kubernetes.io/technitium=true
    publishInternalServices: true

    serviceAccount:
      create: true
      name: external-dns-technitium
    replicaCount: 1
    podAnnotations:
      reloader.stakater.com/auto: "true"

    extraArgs:
      - --rfc2136-host=technitium-dns.technitium-dns.svc
      - --rfc2136-port=53
      - --rfc2136-zone=myk8s.se
      - --rfc2136-tsig-keyname=externaldns-key
      - --rfc2136-tsig-secret-alg=hmac-sha256
      - --rfc2136-tsig-secret=$(RFC2136_TSIG_SECRET)
    env:
      - name: RFC2136_TSIG_SECRET
        valueFrom:
          secretKeyRef:
            name: technitium-rfc2136-tsig
            key: tsig-secret
